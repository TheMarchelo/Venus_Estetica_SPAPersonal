<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Venus Estética</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand logo" href="index.html">Venus Estética</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Volver al Inicio</a></li>
                    <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="logout()">Cerrar Sesión</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container header-pad py-5">
        <h2 class="fancy-heading text-center mb-5">Mi Perfil</h2>

        <div class="row g-4 justify-content-center">

            <!-- User Info Card -->
            <div class="col-md-5">
                <div class="card shadow-sm h-100">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <i class="fas fa-user-circle fa-5x text-gold"></i>
                            <h3 id="p-display-name" class="mt-3">Cargando...</h3>
                            <span class="badge bg-gold" id="p-role-badge">CLIENT</span>
                        </div>

                        <form id="profile-form">
                            <div class="mb-3">
                                <label class="form-label text-muted small">Correo Electrónico</label>
                                <input type="text" class="form-control" id="p-email" disabled>
                            </div>
                            <div class="row">
                                <div class="col-6 mb-3">
                                    <label class="form-label">Nombre</label>
                                    <input type="text" class="form-control" id="p-name" required>
                                </div>
                                <div class="col-6 mb-3">
                                    <label class="form-label">Apellidos</label>
                                    <input type="text" class="form-control" id="p-surname">
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-6 mb-3">
                                    <label class="form-label">Edad</label>
                                    <input type="number" class="form-control" id="p-age">
                                </div>
                                <div class="col-6 mb-3">
                                    <label class="form-label">Teléfono</label>
                                    <input type="tel" class="form-control" id="p-phone">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Dirección de Entrega</label>
                                <textarea class="form-control" id="p-address" rows="2"></textarea>
                            </div>
                            <button type="submit" class="btn btn-gold w-100">Guardar Cambios</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- History Card -->
            <div class="col-md-7">
                <div class="card shadow-sm h-100">
                    <div class="card-body p-4">
                        <h4 class="fancy-text mb-4">Mis Citas & Pedidos</h4>

                        <ul class="nav nav-tabs mb-3" id="historyTab" role="tablist">
                            <li class="nav-item">
                                <button class="nav-link active text-gold" data-bs-toggle="tab"
                                    data-bs-target="#history-citas">Citas</button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link text-gold" data-bs-toggle="tab"
                                    data-bs-target="#history-pedidos">Pedidos</button>
                            </li>
                        </ul>

                        <div class="tab-content" id="myTabContent">
                            <div class="tab-pane fade show active" id="history-citas">
                                <div class="table-responsive">
                                    <table class="table table-hover">
                                        <thead>
                                            <tr>
                                                <th>Fecha</th>
                                                <th>Servicio</th>
                                                <th>Estado</th>
                                            </tr>
                                        </thead>
                                        <tbody id="table-citas-body">
                                            <tr>
                                                <td colspan="3" class="text-center">Cargando...</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            <div class="tab-pane fade" id="history-pedidos">
                                <div class="table-responsive">
                                    <table class="table table-hover">
                                        <thead>
                                            <tr>
                                                <th>Fecha</th>
                                                <th>Total</th>
                                                <th>Estado</th>
                                            </tr>
                                        </thead>
                                        <tbody id="table-pedidos-body">
                                            <tr>
                                                <td colspan="3" class="text-center">Cargando...</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="i18n.js"></script> <!-- Reusing for Toasts/Utils -->

    <script>
        // Inline Profile Logic for simplicity in this file, or move to auth.js if preferred.
        // For cleaner separation, let's keep it here or a new profile.js.
        // Adapting auth.js is better for shared auth state.
    </script>
    <script src="auth.js"></script> <!-- Will handle logic -->

</body>

</html>
